<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Finanzas ERP" />
<meta name="theme-color" content="#05070d" />
<title>Finanzas Personales ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   FINANZAS PERSONALES ERP — Hoja de estilos
   Estética: dark mode, neón, glassmorphism, dashboard premium
   ============================================================ */

:root{
  --bg:#05070d;
  --bg-2:#080d1a;
  --bg-grad:radial-gradient(1200px 700px at 78% -10%, rgba(45,155,255,.10), transparent 60%),
            radial-gradient(900px 600px at 8% 8%, rgba(168,85,255,.10), transparent 55%),
            radial-gradient(1000px 800px at 50% 120%, rgba(43,255,158,.06), transparent 60%);
  --surface:rgba(16,22,38,.62);
  --surface-2:rgba(22,29,48,.72);
  --surface-solid:#0d1324;
  --border:rgba(125,160,255,.14);
  --border-strong:rgba(125,180,255,.28);
  --text:#e8edff;
  --text-dim:#8794b6;
  --text-faint:#586186;

  --green:#2bff9e;   --green-d:#0e8f57;   --green-g:rgba(43,255,158,.35);
  --red:#ff3d7f;     --red-d:#b21e57;     --red-g:rgba(255,61,127,.35);
  --blue:#2d9bff;    --blue-d:#1663b8;    --blue-g:rgba(45,155,255,.42);
  --violet:#a855ff;  --violet-d:#6a2bd0;  --violet-g:rgba(168,85,255,.40);
  --amber:#ffb020;   --amber-g:rgba(255,176,32,.32);
  --cyan:#22d3ee;

  --radius:16px;
  --radius-sm:11px;
  --shadow:0 10px 40px -12px rgba(0,0,0,.65);
  --nav-w:246px;
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}

/* ---------- TEMA CLARO ---------- */
body.light{
  --bg:#eef1f8;
  --bg-2:#e5e9f3;
  --bg-grad:radial-gradient(1200px 700px at 78% -10%, rgba(45,155,255,.12), transparent 60%),
            radial-gradient(900px 600px at 8% 8%, rgba(168,85,255,.10), transparent 55%),
            radial-gradient(1000px 800px at 50% 120%, rgba(43,255,158,.08), transparent 60%);
  --surface:rgba(255,255,255,.78);
  --surface-2:rgba(255,255,255,.9);
  --surface-solid:#ffffff;
  --border:rgba(30,50,100,.14);
  --border-strong:rgba(30,50,100,.26);
  --text:#141a2e;
  --text-dim:#4a5578;
  --text-faint:#8089a6;
  --green:#0e9d63;   --green-d:#0b7a4d;   --green-g:rgba(14,157,99,.16);
  --red:#e11d63;     --red-d:#b21e57;     --red-g:rgba(225,29,99,.14);
  --blue:#1668c9;    --blue-d:#0f4e9e;    --blue-g:rgba(22,104,201,.16);
  --violet:#7c3aed;  --violet-d:#5b21b6;  --violet-g:rgba(124,58,237,.16);
  --amber:#b7791f;   --amber-g:rgba(183,121,31,.16);
  --shadow:0 10px 40px -14px rgba(30,50,100,.28);
}
body.light .sidebar{background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(240,243,250,.96));border-right:1px solid var(--border)}
body.light .topbar{background:linear-gradient(180deg,rgba(238,241,248,.9),rgba(238,241,248,.4));border-bottom:1px solid var(--border)}
body.light .matrix thead th{background:#e5eaf4;color:var(--text-dim)}
body.light .matrix .rowh{background:#f2f5fb;color:var(--text)}
body.light .matrix .grp .rowh{background:#e2e8f5}
body.light .matrix .grp td{color:var(--text)}
body.light .matrix th,body.light .matrix td{border-color:rgba(30,50,100,.1)}
body.light .matrix tr.sub .rowh{background:#e9edf7}
body.light .matrix tr.net-ing .rowh{background:#dff6ea}
body.light .matrix tr.net-egr .rowh{background:#fce4ee}
body.light .matrix tr.acc-prev .rowh{background:#fbf1dc}
body.light .matrix tr.acc .rowh{background:#dff6ea}
body.light .brand-mark{filter:none}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  background-image:var(--bg-grad);
  background-attachment:fixed;
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  font-size:14px;
  line-height:1.5;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(125,160,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(125,160,255,.025) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(circle at 50% 30%,#000,transparent 85%);
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(125,160,255,.16);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(125,160,255,.32);background-clip:padding-box}

a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ---------- LAYOUT ---------- */
.app{display:flex;min-height:100vh;position:relative;z-index:1}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:var(--nav-w);flex-shrink:0;position:fixed;inset:0 auto 0 0;height:100vh;
  background:linear-gradient(180deg,rgba(10,15,28,.92),rgba(6,9,18,.96));
  backdrop-filter:blur(18px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:60;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.brand{padding:22px 20px 16px;display:flex;align-items:center;gap:12px}
.brand-mark{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;position:relative;
  background:linear-gradient(135deg,var(--blue),var(--violet));
  box-shadow:0 0 22px var(--blue-g),inset 0 0 12px rgba(255,255,255,.18);
  display:grid;place-items:center;font-family:var(--font-display);font-weight:700;color:#fff;font-size:19px;
}
.brand-mark::after{content:"";position:absolute;inset:0;border-radius:11px;border:1px solid rgba(255,255,255,.25)}
.brand-txt h1{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:.3px;line-height:1.1}
.brand-txt span{font-size:10.5px;color:var(--text-faint);letter-spacing:2.5px;text-transform:uppercase;font-weight:600}

.nav{flex:1;overflow-y:auto;padding:6px 12px 20px;display:flex;flex-direction:column;gap:2px}
.nav-label{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);font-weight:700;padding:14px 12px 6px}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;
  color:var(--text-dim);font-weight:500;font-size:13.5px;position:relative;
  transition:.16s;border:1px solid transparent;
}
.nav-item .ic{width:19px;height:19px;flex-shrink:0;opacity:.85;stroke-width:1.8}
.nav-item:hover{background:rgba(125,160,255,.06);color:var(--text)}
.nav-item.active{
  background:linear-gradient(90deg,rgba(45,155,255,.16),rgba(45,155,255,.02));
  color:#fff;border-color:rgba(45,155,255,.28);
}
.nav-item.active::before{
  content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;
  background:var(--blue);box-shadow:0 0 12px var(--blue);
}
.nav-item.active .ic{opacity:1;color:var(--blue)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;
  border-radius:9px;display:grid;place-items:center;padding:0 5px;box-shadow:0 0 10px var(--red-g)}

/* ---------- MAIN ---------- */
.main{flex:1;margin-left:var(--nav-w);min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;
  padding:16px 26px;background:linear-gradient(180deg,rgba(6,9,18,.86),rgba(6,9,18,.35));
  backdrop-filter:blur(14px);border-bottom:1px solid var(--border);
}
.hamburger{display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  width:40px;height:40px;place-items:center;color:var(--text)}
.page-title{font-family:var(--font-display);font-size:20px;font-weight:600;letter-spacing:.2px}
.page-sub{font-size:12px;color:var(--text-dim);margin-top:1px}
.topbar-spacer{flex:1}
.top-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);
  padding:8px 14px;border-radius:11px;font-size:12.5px;font-weight:600;color:var(--text-dim)}
.top-chip b{color:var(--text);font-family:var(--font-mono)}
.theme-btn{width:40px;height:40px;flex-shrink:0;display:grid;place-items:center;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);transition:.15s}
.theme-btn:hover{color:var(--text);border-color:var(--border-strong)}
.theme-btn .ic{width:18px;height:18px}
.top-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}

.content{padding:26px;max-width:1500px;width:100%}
.view{display:none;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- SECTIONS / HEADERS ---------- */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:26px 0 14px;flex-wrap:wrap}
.sec-head:first-child{margin-top:0}
.sec-head h2{font-family:var(--font-display);font-size:16px;font-weight:600;display:flex;align-items:center;gap:9px}
.sec-head h2::before{content:"";width:4px;height:16px;border-radius:3px;background:var(--blue);box-shadow:0 0 10px var(--blue)}
.sec-head p{font-size:12px;color:var(--text-dim);margin-top:3px}

/* ---------- CARDS ---------- */
.card{
  background:var(--surface);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.card.pad{padding:20px}
.card.filters-card{overflow:visible;position:relative;z-index:50}
.card.filters-card .table-wrap,.filters-card~.table-wrap{z-index:1}
.card-title{font-size:12.5px;color:var(--text-dim);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.card-title .ic{width:15px;height:15px;flex-shrink:0;stroke-width:2}
svg.ic{width:16px;height:16px}

.grid{display:grid;gap:16px}
.g-kpi{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-4{grid-template-columns:repeat(4,1fr)}

/* KPI cards */
.kpi{padding:18px;border-radius:var(--radius);position:relative;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(14px)}
.kpi::before{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none}
.kpi .k-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi .k-label{font-size:11.5px;color:var(--text-dim);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.kpi .k-ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.kpi .k-ic .ic{width:15px;height:15px;stroke-width:2}
.kpi .k-val{font-family:var(--font-mono);font-size:23px;font-weight:600;letter-spacing:-.5px;line-height:1.1}
.kpi .k-foot{font-size:11.5px;color:var(--text-faint);margin-top:7px;display:flex;align-items:center;gap:6px}
.kpi .trend{font-family:var(--font-mono);font-weight:600;padding:1px 6px;border-radius:6px;font-size:11px}
.trend.up{color:var(--green);background:var(--green-g)}
.trend.down{color:var(--red);background:var(--red-g)}

.acc-green{border-top:2px solid var(--green);box-shadow:0 0 0 1px var(--border),0 -1px 22px -6px var(--green-g)}
.acc-green .k-ic{background:var(--green-g);color:var(--green)}
.acc-green .k-val{color:var(--green)}
.acc-red{border-top:2px solid var(--red)}
.acc-red .k-ic{background:var(--red-g);color:var(--red)}
.acc-red .k-val{color:var(--red)}
.acc-blue{border-top:2px solid var(--blue)}
.acc-blue .k-ic{background:var(--blue-g);color:var(--blue)}
.acc-violet{border-top:2px solid var(--violet)}
.acc-violet .k-ic{background:var(--violet-g);color:var(--violet)}
.acc-violet .k-val{color:var(--violet)}
.acc-amber{border-top:2px solid var(--amber)}
.acc-amber .k-ic{background:var(--amber-g);color:var(--amber)}

/* ---------- BUTTONS ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:10px;font-size:13px;
  font-weight:600;border:1px solid var(--border-strong);background:var(--surface-2);color:var(--text);transition:.16s;white-space:nowrap}
.btn:hover{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue-g),0 0 18px -4px var(--blue-g);transform:translateY(-1px)}
.btn .ic{width:16px;height:16px;stroke-width:2}
.btn-primary{background:linear-gradient(135deg,var(--blue),#1b7ae0);border-color:transparent;color:#fff;
  box-shadow:0 4px 18px -4px var(--blue-g)}
.btn-primary:hover{box-shadow:0 6px 24px -4px var(--blue-g);filter:brightness(1.08)}
.btn-green{background:linear-gradient(135deg,var(--green-d),#12a866);border-color:transparent;color:#eafff4}
.btn-blue{background:linear-gradient(135deg,#6366f1,#4338ca);border-color:transparent;color:#fff}
.btn-blue:hover{filter:brightness(1.08);box-shadow:0 6px 24px -4px rgba(99,102,241,.5)}
.btn-danger{background:linear-gradient(135deg,var(--red-d),#8f1846);border-color:transparent;color:#ffe6ef}
.btn-ghost{background:transparent;border-color:var(--border)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ---------- TABLES ---------- */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}
/* Columna de acciones (editar/borrar) siempre visible, fija a la derecha */
.col-acc{position:sticky;right:0;background:var(--surface);z-index:3;box-shadow:-6px 0 8px -4px rgba(0,0,0,.25)}
thead .col-acc{z-index:4}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
thead th{
  text-align:left;padding:12px 14px;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text-faint);font-weight:700;background:rgba(10,15,28,.7);position:sticky;top:0;white-space:nowrap;
  border-bottom:1px solid var(--border)
}
tbody td{padding:11px 14px;border-bottom:1px solid rgba(125,160,255,.07);vertical-align:middle;white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:.12s}
tbody tr:hover{background:rgba(45,155,255,.05)}
td.num,th.num{text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums}
tfoot td{padding:12px 14px;font-weight:700;font-family:var(--font-mono);background:rgba(10,15,28,.6);border-top:1px solid var(--border-strong)}
.t-empty{padding:40px;text-align:center;color:var(--text-faint);font-size:13px}
.t-empty .ic{width:34px;height:34px;margin:0 auto 10px;display:block;opacity:.5}

.pos{color:var(--green)}
.neg{color:var(--red)}
.muted{color:var(--text-dim)}

/* Pills / tags */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid transparent;line-height:1.4}
.pill-green{background:var(--green-g);color:var(--green)}
.pill-red{background:var(--red-g);color:var(--red)}
.pill-blue{background:var(--blue-g);color:var(--blue)}
.pill-violet{background:var(--violet-g);color:var(--violet)}
.pill-amber{background:var(--amber-g);color:var(--amber)}
.pill-gray{background:rgba(125,160,255,.1);color:var(--text-dim)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}

/* row actions */
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.ia{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:rgba(125,160,255,.08);
  border:1px solid transparent;color:var(--text-dim);transition:.14s}
.ia:hover{color:var(--text);border-color:var(--border-strong)}
.ia.del:hover{color:var(--red);border-color:var(--red);background:var(--red-g)}
.ia .ic{width:15px;height:15px;stroke-width:2}

/* ---------- FILTERS BAR ---------- */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;color:var(--text-dim);font-weight:600;letter-spacing:.2px}
input,select,textarea{
  background:var(--surface-solid);border:1px solid var(--border);border-radius:10px;color:var(--text);
  padding:9px 12px;font-size:13px;outline:none;transition:.15s;width:100%
}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-g)}
input::placeholder{color:var(--text-faint)}
select{cursor:pointer;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%238794b6' stroke-width='2'><path d='M3 5l4 4 4-4'/></svg>");
  background-repeat:no-repeat;background-position:right 11px center;padding-right:30px}
.search{position:relative;flex:1;min-width:170px}
.search input{padding-left:36px}
.search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-faint);pointer-events:none}
.inp-inline{max-width:150px}
/* ---- multiselect de filtros ---- */
.ms{position:relative;min-width:150px}
.ms.open{z-index:5000}
/* Los últimos filtros de la fila abren su panel alineado a la derecha para no salirse */
.ms:nth-last-child(-n+2) .ms-panel{left:auto;right:0}
/* El bloque de totales debajo de los filtros no debe competir en apilado con el panel abierto */
#movTotals{position:relative;z-index:1}
.ms-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);
  padding:9px 12px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;font-family:var(--font-body)}
.ms-btn:hover{border-color:var(--border-strong);color:var(--text)}
.ms-btn.active{color:var(--text);border-color:var(--blue);background:var(--blue-g)}
.ms-summary{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-chev{width:15px;height:15px;flex-shrink:0;transition:transform .18s;opacity:.7}
.ms.open .ms-chev{transform:rotate(180deg)}
.ms-panel{position:absolute;top:calc(100% + 6px);left:0;min-width:100%;max-width:min(320px,92vw);z-index:5000;
  background:var(--surface-solid);border:1px solid var(--border-strong);border-radius:12px;
  box-shadow:var(--shadow);padding:6px;display:none;max-height:280px;overflow:auto}
.ms.open .ms-panel{display:block;animation:pop .14s}
.ms-panel-head{display:flex;gap:6px;padding:4px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.ms-mini{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text-dim);
  font-size:11px;font-weight:600;padding:5px;cursor:pointer;transition:.15s}
.ms-mini:hover{color:var(--text);border-color:var(--border-strong)}
.ms-opt{display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text)}
.ms-opt:hover{background:var(--surface-2)}
.ms-opt input{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.ms-opt span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---------- MODAL ---------- */
.modal-back{position:fixed;inset:0;z-index:100;background:rgba(3,5,10,.72);backdrop-filter:blur(6px);
  display:none;align-items:flex-start;justify-content:center;padding:40px 18px;overflow-y:auto}
.modal-back.open{display:flex}
.modal{width:100%;max-width:640px;background:linear-gradient(180deg,rgba(18,25,44,.98),rgba(12,18,34,.99));

  const firebaseConfig = {

    "fvalen1981@gmail.com"
    // , "correo-de-mariela@gmail.com"   <-- descomentar y poner el correo cuando toque
  ];

  // Documento compartido único: todos los autorizados leen/escriben el mismo dato
  const DOC_ID = "hogar";        // billetera familiar compartida
  const COLECCION = "finanzas";

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Estado del conector, expuesto al resto de la app en window.CLOUD
  window.CLOUD = {
    ready:false, user:null, saving:false, lastError:null,
    async login(){ try{ await signInWithPopup(auth, provider); }catch(e){ window.__cloudLoginError(e); } },
    async logout(){ await signOut(auth); location.reload(); },
    // Guarda el objeto DB completo en la nube
    async save(dbObject){
      if(!this.user) return false;
      this.saving = true; window.__cloudStatus && window.__cloudStatus('saving');
      try{
        await setDoc(doc(db, COLECCION, DOC_ID), { data: JSON.stringify(dbObject), updatedAt: Date.now(), updatedBy: this.user.email });
        this.saving = false; window.__cloudStatus && window.__cloudStatus('saved');
        return true;

        this.saving = false; this.lastError = e; window.__cloudStatus && window.__cloudStatus('error');
        return false;
      }
    },
    // Trae el objeto DB desde la nube (o null si aún no hay nada guardado)
    async load(){
      if(!this.user) return null;
      try{
        const snap = await getDoc(doc(db, COLECCION, DOC_ID));
        if(snap.exists() && snap.data().data){ return JSON.parse(snap.data().data); }
        return null;
      }catch(e){ this.lastError = e; return null; }
    }
  };

  // Vigila el estado de login: cuando entra un usuario autorizado, arranca la app
  onAuthStateChanged(auth, async (user)=>{
    if(!user){ window.__showLogin && window.__showLogin(); return; }
    const email = (user.email||'').toLowerCase();
    if(!CORREOS_AUTORIZADOS.map(c=>c.toLowerCase()).includes(email)){

      window.__cloudDenied && window.__cloudDenied(email);
      return;
    }
    window.CLOUD.user = { email:user.email, name:user.displayName, photo:user.photoURL };
    window.CLOUD.ready = true;
    window.__cloudReady && window.__cloudReady(window.CLOUD.user);
  });
</script>

  document.documentElement.style.setProperty('--app-hidden','1');

  // Handlers que el conector (window.CLOUD) invoca según el estado:
  window.__showLogin = function(){
    const ls = document.getElementById('loginScreen'); if(ls) ls.style.display='grid';
    document.body.classList.remove('app-visible');
  };
  window.__cloudLoginError = function(e){
    const m = document.getElementById('loginMsg');
    if(m) m.textContent = 'No se pudo iniciar sesión. Probá de nuevo.';
    console.error('Login error', e);
  };
  window.__cloudDenied = function(email){
    const m = document.getElementById('loginMsg');
    if(m) m.textContent = 'La cuenta '+email+' no está autorizada.';
  };
  // Cuando el login es OK y la cuenta está autorizada: cargar datos de la nube y arrancar la app
  window.__cloudReady = async function(user){
    const ls = document.getElementById('loginScreen');
    if(ls){ ls.querySelector('#loginMsg').textContent=''; ls.querySelector('#loginMsg').style.color='#8794b6'; ls.querySelector('#loginMsg').textContent='Cargando tus datos...'; }
    // Trae DB de la nube; si no hay nada aún, deja null (la app usará blankDB y podés importar tu JSON)
    let cloudDB = null;
    try{ cloudDB = await window.CLOUD.load(); }catch(e){ console.error(e); }
    window.__CLOUD_DB = cloudDB;          // lo lee loadDB() del index
    window.__CLOUD_ACTIVE = true;         // activa el modo nube en saveDB/loadDB
    if(ls) ls.style.display='none';
    document.body.classList.add('app-visible');
    // Arranca la app (init está definido en el index)
    if(typeof init === 'function' && !window.__appStarted){ window.__appStarted=true; init(); }
    // Muestra quién está logueado + estado de guardado
    window.__renderCloudBadge && window.__renderCloudBadge(user);
  };
  // Actualiza el chip "Datos locales" -> estado de nube
  window.__cloudStatus = function(state){
    const el = document.getElementById('cloudDot');
    if(!el) return;
    const map = { saving:['Guardando…','#ffb020'], saved:['En la nube ✓','#2bff9e'], error:['Error al guardar','#ff3d7f'] };
    const [txt,col] = map[state]||['En la nube','#2bff9e'];
    el.textContent = txt; el.style.color = col;
  };
  window.__renderCloudBadge = function(user){
    // Reemplaza el texto "Datos locales" del topbar por el estado de nube + usuario
    const chip = document.querySelector('.status-dot') || document.getElementById('dataChip');
    // se completa en el enganche del index
  };
</script>

------------------------------------------------------------------ */
function saveDB(){
  // Respaldo local siempre (por si falla la red)
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }catch(e){}
  // Guardado en la nube (con pequeño anti-rebote para no saturar en ediciones rápidas)
  if(window.__CLOUD_ACTIVE && window.CLOUD){
    clearTimeout(window.__cloudSaveTimer);
    window.__cloudSaveTimer = setTimeout(()=>{ window.CLOUD.save(DB); }, 600);
  }
}
function loadDB(){
  // En modo nube, prioriza lo que vino de Firestore
  if(window.__CLOUD_ACTIVE){
    if(window.__CLOUD_DB) return window.__CLOUD_DB;
    return null; // no hay nada en la nube todavía -> se creará blankDB y podrás importar tu JSON
  }
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){ try{ return JSON.parse(raw); }catch(e){ return null; } }
  return null;
}

function money(n, decimals=0){
  const sym = DB?.config?.monedaSimbolo || '$';
  const val = (num(n)).toLocaleString('es-PY',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
  return sym+' '+val;
}

// Descarga de archivos (JSON / CSV) — 100% frontend
function download(filename, content, mime='text/plain'){
  const blob = new Blob([content],{type:mime+';charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),500);
}
// Convierte un array de objetos a CSV
function toCSV(headers, rows){
  const escc = v => '"'+String(v??'').replace(/"/g,'""')+'"';
  const head = headers.map(escc).join(',');
  const body = rows.map(r=>r.map(escc).join(',')).join('\n');
  return '\ufeff'+head+'\n'+body;
}

// Fecha ISO -> "Ene 2025" / "05 Ene 2025"
function fmtDate(iso, full=false){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d)) return iso;
  const day = String(d.getDate()).padStart(2,'0');
  return full ? `${day} ${MESES[d.getMonth()]} ${d.getFullYear()}` : `${MESES[d.getMonth()]} ${d.getFullYear()}`;
}
function monthKeyOf(iso){ return iso? iso.slice(0,7) : ''; } // "2025-01"
function currentMonthKey(){ return todayISO().slice(0,7); }

/* ------------------------------------------------------------------

------------------------------------------------------------------ */
function toast(msg, type='ok'){
  const map = {ok:'check',err:'x',info:'info'};
  const t = document.createElement('div');
  t.className = 'toast '+type;
  t.innerHTML = icon(map[type]||'info') + '<span>'+esc(msg)+'</span>';

  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(40px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),320); }, 2600);

function buildNav(){
  const nav = $('#nav');
  let html=''; let lastGroup='';
  MODULES.forEach(m=>{
    if(m.group!==lastGroup){ html += `<div class="nav-label">${m.group}</div>`; lastGroup=m.group; }
    const badge = m.id==='alertas' ? `<span class="nav-badge" id="alertBadge" style="display:none">0</span>` : '';
    html += `<a class="nav-item" data-view="${m.id}" onclick="go('${m.id}')">${icon(m.icon)}<span>${m.label}</span>${badge}</a>`;
  });
  nav.innerHTML = html;
}

function go(view){
  currentView = view;
  const mod = MODULES.find(m=>m.id===view) || MODULES[0];
  $('#pageTitle').textContent = mod.label;
  $('#pageSub').textContent = mod.sub;
  $$('.nav-item').forEach(n=> n.classList.toggle('active', n.dataset.view===view));
  // destruir charts previos
  Object.values(chartRegistry).forEach(c=>{ try{c.destroy();}catch(e){} });
  chartRegistry = {};
  const render = RENDERERS[view];
  const content = $('#content');
  content.innerHTML = '<div class="view active" id="view-'+view+'"></div>';
  if(render) render($('#view-'+view));
  window.scrollTo(0,0);
  toggleNav(false);
  updateTopbar();
}

  sb.classList.toggle('open', open);

  const light = !document.body.classList.contains('light');

  try{ localStorage.setItem(THEME_KEY, t); }catch(e){}

// Helper para crear gráficos Chart.js con estilo consistente
function makeChart(id, config){
  const ctx = document.getElementById(id);
  if(!ctx) return;
  Chart.defaults.color = C.dim;
  Chart.defaults.font.family = "'Inter',sans-serif";
  Chart.defaults.font.size = 11;
  config.options = config.options || {};
  config.options.responsive = true;
  config.options.maintainAspectRatio = false;
  chartRegistry[id] = new Chart(ctx, config);
  return chartRegistry[id];
}

/* ------------------------------------------------------------------
   7. MODAL + CONSTRUCTOR DE FORMULARIOS (reutilizable)
   fields: [{key,label,type,options,value,required,full,hint,step,attrs}]
   type: text|number|date|select|textarea|checkbox|file
------------------------------------------------------------------ */
function closeModal(){ $('#modalBack').classList.remove('open'); $('#modalEl').innerHTML=''; }
$('#modalBack')?.addEventListener('click', e=>{ if(e.target.id==='modalBack') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function fieldHTML(f){
  const v = f.value ?? '';
  const req = f.required ? 'required' : '';
  const cls = f.full ? 'field full' : 'field';
  const attrs = f.attrs || '';
  let input='';
  if(f.type==='select'){
    input = `<select id="f_${f.key}" ${req}>` + (f.options||[]).map(o=>{
      const val = typeof o==='object'? o.value : o;
      const lab = typeof o==='object'? o.label : o;
      return `<option value="${esc(val)}" ${String(val)===String(v)?'selected':''}>${esc(lab)}</option>`;
    }).join('') + `</select>`;
  } else if(f.type==='textarea'){
    input = `<textarea id="f_${f.key}" rows="2" ${req}>${esc(v)}</textarea>`;
  } else if(f.type==='checkbox'){
    return `<div class="field ${f.full?'full':''}"><div class="checkbox-field"><input type="checkbox" id="f_${f.key}" ${v?'checked':''}><label for="f_${f.key}">${f.label}</label></div>${f.hint?`<div class="hint">${f.hint}</div>`:''}</div>`;
  } else if(f.type==='file'){
    input = `<input type="file" id="f_${f.key}" ${attrs}><input type="hidden" id="f_${f.key}_name" value="${esc(v)}">${v?`<div class="hint">Actual: ${esc(v)}</div>`:''}`;
  } else {
    const step = f.step? `step="${f.step}"`:'';
    input = `<input type="${f.type||'text'}" id="f_${f.key}" value="${esc(v)}" ${step} ${req} ${attrs}>`;
  }
  return `<div class="${cls}"><label for="f_${f.key}">${f.label}${f.required?' *':''}</label>${input}${f.hint?`<div class="hint">${f.hint}</div>`:''}</div>`;
}

function openForm(title, fields, onSave, opts={}){
  const body = `<div class="form-grid">${fields.map(fieldHTML).join('')}</div>`;
  $('#modalEl').innerHTML = `
    <div class="modal-head"><h3>${esc(title)}</h3><button class="x" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modalSave">${icon('check')} Guardar</button>
    </div>`;
  $('#modalBack').classList.add('open');
  $('#modalSave').onclick = ()=>{
    const data = {};
    let ok = true;
    fields.forEach(f=>{
      const el = $('#f_'+f.key);
      if(!el) return;
      if(f.type==='checkbox') data[f.key] = el.checked;
      else if(f.type==='number') data[f.key] = num(el.value);
      else if(f.type==='file'){ data[f.key] = el.files[0]? el.files[0].name : ($('#f_'+f.key+'_name')?.value||''); }
      else data[f.key] = el.value.trim();
      if(f.required && (data[f.key]==='' || data[f.key]==null)){ ok=false; el.style.borderColor='var(--red)'; }
    });
    if(!ok){ toast('Completá los campos obligatorios','err'); return; }
    onSave(data);
    closeModal();
  };
}

// Agrupa totales de movimientos de un mes ("YYYY-MM")
function monthTotals(key){
  const t = {Ingreso:0,Egreso:0,Ahorro:0,Inversión:0,'Pago deuda':0,'Pago tarjeta':0};
  DB.movimientos.filter(m=>monthKeyOf(m.fecha)===key).forEach(m=>{ t[m.tipo]=(t[m.tipo]||0)+num(m.monto); });
  t.resultado = t.Ingreso - t.Egreso - t.Ahorro - t.Inversión - t['Pago deuda'] - t['Pago tarjeta'];
  t.egresoTotal = t.Egreso + t['Pago deuda'] + t['Pago tarjeta'];
  return t;
}
// Lista de últimos N meses (keys) hasta el actual
function lastMonths(n){
  const arr=[]; const d=new Date(); d.setDate(1);
  for(let i=n-1;i>=0;i--){ const x=new Date(d); x.setMonth(d.getMonth()-i); arr.push(x.toISOString().slice(0,7)); }
  return arr;
}
function monthLabel(key){ const [y,m]=key.split('-'); return MESES[+m-1]+' '+y.slice(2); }

// Patrimonio neto (usa módulo Patrimonio; si vacío, deriva de inversiones/deudas)
// Pasivos automáticos desde los módulos (saldo efectivo, ya con pagos descontados)
function pasivosAuto(){
  const prestamos = DB.prestamos.filter(p=>p.estado==='Activo').reduce((s,p)=>s+saldoPrestamoEfectivo(p),0);
  const tarjetas = DB.tarjetas.filter(t=>t.estado==='Activa').reduce((s,t)=>s+saldoTarjetaEfectivo(t),0);
  return { prestamos, tarjetas, total: prestamos+tarjetas };
}
function computeNetWorth(){
  const a = DB.patrimonio.activos.reduce((s,x)=>s+num(x.valor),0);
  // Pasivos manuales, excluyendo categorías que ahora vienen automáticas (Préstamos / Tarjetas)
  const manual = DB.patrimonio.pasivos.filter(x=>x.categoria!=='Préstamos' && x.categoria!=='Tarjetas de crédito').reduce((s,x)=>s+num(x.valor),0);
  const auto = pasivosAuto().total;
  const p = manual + auto;
  return { activos:a, pasivos:p, patrimonio:a-p };
}
// Totales de inversiones / ahorros
function investTotals(){
  const invTipos=['CDA','Fondo mutuo','Acciones','Cripto','Inmueble','Otro'];
  let ahorrado=0, invertido=0, valorActual=0, rendimiento=0;
  DB.inversiones.forEach(i=>{
    valorActual += num(i.valorActual);
    const ganancia = num(i.valorActual) - num(i.montoInicial);
    rendimiento += ganancia;
    if(i.tipo==='CDA' || i.tipo==='Fondo mutuo') ahorrado+=num(i.valorActual);
    else invertido+=num(i.valorActual);
  });
  return { valorActual, ahorrado, invertido, rendimiento };
}
// Deuda total y cuotas
// Suma de pagos (movimientos) asociados a una tarjeta o préstamo
function pagosAsociados(tipo, campo, id){ return DB.movimientos.filter(m=>m.tipo===tipo && m[campo]===id).reduce((s,m)=>s+num(m.monto),0); }
function saldoTarjetaEfectivo(t){ return Math.max(0, num(t.saldo) - pagosAsociados('Pago tarjeta','tarjetaId',t.id)); }
function saldoPrestamoEfectivo(p){ return Math.max(0, num(p.saldo) - pagosAsociados('Pago deuda','prestamoId',p.id)); }

function debtTotals(){
  const saldoPrest = DB.prestamos.filter(p=>p.estado==='Activo').reduce((s,p)=>s+saldoPrestamoEfectivo(p),0);
  const cuotasPrest = DB.prestamos.filter(p=>p.estado==='Activo').reduce((s,p)=>s+num(p.montoCuota),0);
  const saldoTarj = DB.tarjetas.filter(t=>t.estado==='Activa').reduce((s,t)=>s+saldoTarjetaEfectivo(t),0);
  const pagoTarj = DB.tarjetas.filter(t=>t.estado==='Activa').reduce((s,t)=>s+num(t.pagoTotal),0);
  return { saldoPrest, cuotasPrest, saldoTarj, pagoTarj, total:saldoPrest+saldoTarj, cuotasMes:cuotasPrest };
}
// Distribución de egresos por rubro (mes)
function egresosPorRubro(key){
  const map={};
  DB.movimientos.filter(m=>monthKeyOf(m.fecha)===key && m.tipo==='Egreso').forEach(m=>{ map[m.rubro]=(map[m.rubro]||0)+num(m.monto); });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}
// Variación % entre dos números
function variation(cur, prev){ if(!prev) return cur>0?100:0; return ((cur-prev)/Math.abs(prev))*100; }

// Amortización sistema francés -> {cuota, tabla:[{n,cuota,interes,capital,saldo}], totalInteres, totalPagar}
function amortFrances(monto, tasaAnual, meses){
  const i = (tasaAnual/100)/12;
  let cuota = i===0 ? monto/meses : monto*(i*Math.pow(1+i,meses))/(Math.pow(1+i,meses)-1);
  let saldo = monto, tabla=[], totalInt=0;
  for(let n=1;n<=meses;n++){
    const interes = saldo*i;
    const capital = cuota - interes;
    saldo = Math.max(0, saldo - capital);
    totalInt += interes;
    tabla.push({n, cuota, interes, capital, saldo});
  }
  return { cuota, tabla, totalInteres:totalInt, totalPagar:cuota*meses };
}

/* ------------------------------------------------------------------
   9. GENERADOR DE ALERTAS (automático)
------------------------------------------------------------------ */
function generateAlerts(){
  const al=[]; const today=new Date(); const push=(key,nivel,tipo,titulo,desc,monto)=>al.push({key,nivel,tipo,titulo,desc,monto,fecha:todayISO()});

  // Vencimiento de tarjetas (próximos 7 días)
  DB.tarjetas.filter(t=>t.estado==='Activa').forEach(t=>{
    const dia = parseInt((t.vencimiento||'').slice(-2))||null;
    if(dia){
      const diff = dia - today.getDate();
      if(diff>=0 && diff<=7) push('tarj-'+t.id,'Alta','Tarjeta',`Vence ${t.nombre}`,`Pago de ${t.banco} vence el día ${dia}.`,t.pagoTotal);
    }
    // Endeudamiento alto
    if(num(t.saldo)/num(t.limiteTotal) > 0.8) push('tarjlim-'+t.id,'Media','Endeudamiento',`Límite alto en ${t.nombre}`,`Uso del ${pct(num(t.saldo)/num(t.limiteTotal)*100,0)} del límite.`,t.saldo);
  });
  // Préstamos: próximos vencimientos
  DB.prestamos.filter(p=>p.estado==='Activo').forEach(p=>{
    const dia = parseInt(p.vencMensual)||null;
    if(dia){ const diff=dia-today.getDate(); if(diff>=0&&diff<=5) push('prest-'+p.id,'Alta','Préstamo',`Cuota ${p.entidad}`,`Cuota de préstamo ${p.tipo} vence el día ${dia}.`,p.montoCuota); }
  });
  // Egresos mayores al presupuesto (mes actual)
  const key=currentMonthKey(); const tot=monthTotals(key);
  const presMes = DB.presupuesto.filter(b=>b.anio===today.getFullYear() && b.mes===today.getMonth());
  const presEgreso = presMes.filter(b=>b.tipo==='Egreso').reduce((s,b)=>s+num(b.proyectado),0);
  if(presEgreso>0 && tot.Egreso > presEgreso*1.05) push('egr-over','Media','Presupuesto','Egresos sobre presupuesto',`Gastaste ${money(tot.Egreso)} vs ${money(presEgreso)} presupuestado.`,tot.Egreso-presEgreso);
  // Ahorro menor al objetivo
  const presAhorro = presMes.filter(b=>b.tipo==='Ahorro').reduce((s,b)=>s+num(b.proyectado),0);
  if(presAhorro>0 && tot.Ahorro < presAhorro*0.9) push('ahorro-low','Media','Ahorro','Ahorro por debajo del objetivo',`Ahorraste ${money(tot.Ahorro)} de ${money(presAhorro)} previsto.`,presAhorro-tot.Ahorro);
  // Endeudamiento alto global
  const nw=computeNetWorth(); if(nw.activos>0 && nw.pasivos/nw.activos>0.5) push('deuda-alta','Alta','Endeudamiento','Nivel de deuda elevado',`Pasivos representan ${pct(nw.pasivos/nw.activos*100,0)} de tus activos.`,nw.pasivos);
  // Variación negativa del flujo
  const ms=lastMonths(2); if(ms.length===2){ const a=monthTotals(ms[0]).resultado,b=monthTotals(ms[1]).resultado; if(b<a && a>0) push('flujo-neg','Baja','Flujo','Flujo mensual en baja',`El resultado del mes cayó respecto al anterior.`,a-b); }
  // Inversiones sin actualización (valorActual==montoInicial)
  DB.inversiones.forEach(i=>{ if(num(i.valorActual)===num(i.montoInicial)) push('inv-'+i.id,'Baja','Inversión',`Actualizá ${i.instrumento}`,`El valor no fue actualizado desde el inicio.`,i.valorActual); });
  // Metas atrasadas
  DB.metas.filter(m=>m.estado==='Activa').forEach(m=>{
    const g=goalCalc(m);
    if(g.atrasada) push('meta-'+m.id,'Media','Meta',`Meta atrasada: ${m.nombre}`,`Avance ${pct(g.avance,0)}, deberías ir en ${pct(g.esperado,0)}.`,g.faltante);
  });
  return al;
}
// Cálculo de una meta
function goalCalc(m){
  const objetivo=num(m.objetivo), acum=num(m.acumulado);
  const avance = objetivo? (acum/objetivo)*100 : 0;
  const faltante = Math.max(0, objetivo-acum);
  const hoy=new Date(); const fin=new Date((m.fechaObjetivo||todayISO())+'T00:00:00');
  const mesesRest = Math.max(0, Math.round((fin-hoy)/(1000*60*60*24*30.4)));
  const inicio = new Date(fin); inicio.setMonth(inicio.getMonth()-Math.max(1, Math.round(objetivo/Math.max(1,num(m.aporteMensual)))));
  const aporteNecesario = mesesRest? faltante/mesesRest : faltante;
  // Esperado según tiempo transcurrido (aprox lineal)
  const totalMeses = objetivo/Math.max(1,num(m.aporteMensual));
  const transcurridos = Math.max(0, totalMeses - mesesRest);
  const esperado = clamp((transcurridos/Math.max(1,totalMeses))*100,0,100);
  return { avance:clamp(avance,0,100), faltante, mesesRest, aporteNecesario, esperado, desvio:avance-esperado, atrasada:avance < esperado-8 && m.estado==='Activa' };
}

function miniStat(label,val,cls,foot){

// Proyección de flujo hacia adelante usando módulo Flujo
function projectFlow(nMonths){
  const labels=[], acum=[]; let running=0;
  for(let i=0;i<nMonths;i++){
    let ing=0,egr=0;
    DB.flujo.forEach(r=>{
      const v=num(r.valores[i]||0);
      if(r.grupo==='Ingresos') ing+=v; else egr+=v;
    });
    running += (ing-egr);
    acum.push(Math.round(running));
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+i);
    labels.push(MESES[d.getMonth()]+' '+String(d.getFullYear()).slice(2));
  }
  return {labels, acum};
}

/* ---- Selector múltiple (checkboxes) para filtros ---- */
function msField(key, placeholder, options){
  // options: array de strings o {value,label}
  const opts = options.map(o=> typeof o==='object' ? o : {value:o,label:o});
  const sel = movFilters[key] || [];
  const summary = sel.length===0 ? placeholder : (sel.length===1 ? (opts.find(o=>o.value===sel[0])?.label || sel[0]) : `${sel.length} seleccionados`);
  return `<div class="ms" id="ms-${key}" data-key="${key}">
    <button type="button" class="ms-btn ${sel.length?'active':''}" onclick="msToggle('${key}')">
      <span class="ms-summary">${esc(summary)}</span>${icon('chevron','ms-chev')}
    </button>
    <div class="ms-panel">
      <div class="ms-panel-head">
        <button type="button" class="ms-mini" onclick="msAll('${key}',true)">Todos</button>
        <button type="button" class="ms-mini" onclick="msAll('${key}',false)">Ninguno</button>
      </div>
      <div class="ms-list">
        ${opts.map(o=>`<label class="ms-opt"><input type="checkbox" value="${esc(o.value)}" ${sel.includes(o.value)?'checked':''} onchange="msPick('${key}',this.value,this.checked)"><span>${esc(o.label)}</span></label>`).join('')}
      </div>
    </div>
  </div>`;
}
function msToggle(key){
  const el = $('#ms-'+key);
  const open = el.classList.contains('open');
  $$('.ms.open').forEach(x=>x.classList.remove('open'));
  if(!open) el.classList.add('open');
}
function msPick(key, value, checked){
  const arr = movFilters[key];
  if(checked){ if(!arr.includes(value)) arr.push(value); }
  else { const i=arr.indexOf(value); if(i>=0) arr.splice(i,1); }
  updateMsSummary(key);
  renderMovTable();
}
function msAll(key, all){
  const el = $('#ms-'+key);
  const boxes = $$('#ms-'+key+' input[type=checkbox]');
  movFilters[key] = all ? boxes.map(b=>b.value) : [];
  boxes.forEach(b=> b.checked = all);
  updateMsSummary(key);
  renderMovTable();
}
function updateMsSummary(key){
  const el = $('#ms-'+key); if(!el) return;
  const sel = movFilters[key]||[];
  const labels = $$('#ms-'+key+' .ms-opt').map(l=>({v:l.querySelector('input').value, t:l.querySelector('span').textContent}));
  const summary = sel.length===0 ? el.querySelector('.ms-btn').dataset.ph || defaultPh(key)
    : (sel.length===1 ? (labels.find(x=>x.v===sel[0])?.t||sel[0]) : `${sel.length} seleccionados`);
  el.querySelector('.ms-summary').textContent = summary;
  el.querySelector('.ms-btn').classList.toggle('active', sel.length>0);
}

/* ==================================================================
   MÓDULO · SALDOS (bolsillos con saldo que sube y baja)
   Un bolsillo suma con "recargas" (movimientos con saldoRecarga=id)
   y resta con gastos (movimientos con saldoId=id).
   modo 'recarga': el saldo se calcula solo dentro del mes en curso.
   modo 'acumula': el saldo considera todo el histórico.
   ================================================================== */
function saldoDe(bolsillo, mesKey){
  // Bolsillo especial "Ahorros": sube con aportes tipo Ahorro, baja con gastos pagados desde él
  if(bolsillo.esAhorro){
    let cargado=0, gastado=0;
    DB.movimientos.forEach(m=>{
      if(m.tipo==='Ahorro' && (!m.saldoRecarga || m.saldoRecarga===bolsillo.id)) cargado+=num(m.monto);
      else if(m.saldoId===bolsillo.id) gastado+=num(m.monto);
    });
    return { cargado, gastado, disponible: cargado-gastado };
  }
  // mesKey opcional: si el bolsillo es modo 'recarga', se limita a ese mes (por defecto, el actual)
  const key = mesKey || currentMonthKey();
  const enRango = m => bolsillo.modo==='acumula' ? true : (monthKeyOf(m.fecha)===key);
  let cargado=0, gastado=0;
  DB.movimientos.forEach(m=>{
    if(!enRango(m)) return;
    if(m.saldoRecarga===bolsillo.id) cargado += num(m.monto);   // recarga: entra plata al bolsillo
    else if(m.saldoId===bolsillo.id) gastado += num(m.monto);   // gasto pagado desde el bolsillo
  });
  return { cargado, gastado, disponible: cargado-gastado };
}
// Ahorro acumulado real = aportes de ahorro − retiros pagados desde el bolsillo Ahorros
function ahorroBolsilloId(){ const b=DB.saldos&&DB.saldos.find(s=>s.esAhorro); return b?b.id:null; }
function ahorroAcumulado(){
  const aid=ahorroBolsilloId(); let aportes=0, retiros=0;
  DB.movimientos.forEach(m=>{
    if(m.tipo==='Ahorro' && (!m.saldoRecarga || m.saldoRecarga===aid)) aportes+=num(m.monto);
    if(aid && m.saldoId===aid && m.tipo!=='Ahorro') retiros+=num(m.monto);
  });
  return aportes - retiros;
}

function renderPresTable(){
  const rows = presRows(presMonth.anio, presMonth.mes);
  const totalIngProy = rows.filter(r=>r.tipo==='Ingreso').reduce((s,r)=>s+num(r.proyectado),0);
  const grandProy = rows.reduce((s,r)=>s+num(r.proyectado),0) || 1;

  const tipoColor={'Ingreso':'green','Egreso':'red','Ahorro':'blue','Inversión':'violet'};
  $('#presTable').innerHTML = `
    <thead><tr>
      <th>Tipo</th><th>Rubro</th><th>Concepto</th>
      <th class="num">Proyectado</th><th class="num">Real</th><th class="num">Diferencia</th>
      <th class="num">Variación</th><th class="num">Particip.</th><th></th>
    </tr></thead>
    <tbody>${ rows.length? rows.map(r=>{
      const dif = num(r.real)-num(r.proyectado);
      const varp = num(r.proyectado)? (dif/num(r.proyectado))*100 : 0;
      const part = (num(r.proyectado)/grandProy)*100;
      return `<tr>
        <td><span class="pill pill-${tipoColor[r.tipo]||'gray'}">${r.tipo}</span></td>
        <td>${esc(r.rubro)}</td>
        <td class="muted">${esc(r.concepto||'—')}</td>
        <td class="num"><input style="max-width:110px;text-align:right;padding:5px 8px" type="number" value="${num(r.proyectado)}" onchange="presEdit('${r.id}','proyectado',this.value)"></td>
        <td class="num"><input style="max-width:110px;text-align:right;padding:5px 8px" type="number" value="${num(r.real)}" onchange="presEdit('${r.id}','real',this.value)"></td>
        <td class="num ${dif>=0?'pos':'neg'}">${dif>=0?'+':''}${money(dif)}</td>
        <td class="num ${varp>=0?'pos':'neg'}">${pct(varp,1)}</td>
        <td class="num muted">${pct(part,1)}</td>
        <td><div class="row-actions">
          <button class="ia" onclick="editPresRow('${r.id}')">${icon('edit')}</button>
          <button class="ia del" onclick="delPresRow('${r.id}')">${icon('trash')}</button></div></td>
      </tr>`;
    }).join('') : tableEmpty(9,'Sin filas de presupuesto para este mes. Agregá rubros o replicá desde otro mes.') }
    </tbody>`;

  // KPIs
  const byType = t=>rows.filter(r=>r.tipo===t);
  const sumP = arr=>arr.reduce((s,r)=>s+num(r.proyectado),0);
  const sumR = arr=>arr.reduce((s,r)=>s+num(r.real),0);
  const ingP=sumP(byType('Ingreso')), egrP=sumP(byType('Egreso')), ahoP=sumP(byType('Ahorro')), invP=sumP(byType('Inversión'));
  const resProy = ingP-egrP-ahoP-invP;
  const resReal = sumR(byType('Ingreso'))-sumR(byType('Egreso'))-sumR(byType('Ahorro'))-sumR(byType('Inversión'));
  $('#presKpis').innerHTML = `
    ${miniStat('Ingresos proyect.',money(ingP),'pos','Total ingresos')}
    ${miniStat('Egresos proyect.',money(egrP),'neg','Total egresos')}
    ${miniStat('Resultado proyect.',money(resProy),resProy>=0?'pos':'neg','Ing − egr − ahorro − inv')}
    ${miniStat('Resultado real',money(resReal),resReal>=0?'pos':'neg','Diferencia: '+money(resReal-resProy))}`;
}

function syncPresupuestoToFlujo(resumido, soloMes){
  const grupoDe = (b)=>{
    if(b.tipo==='Ingreso')   return 'Ingresos';
    if(b.tipo==='Ahorro')    return 'Ahorros';
    if(b.tipo==='Inversión') return 'Inversiones';
    const ru = DB.rubros.find(r=>r.nombre===b.rubro);
    return (ru && ru.tipo==='Egreso fijo') ? 'Egresos fijos' : 'Egresos variables';
  };
  const colDe = (anio,mes)=> (anio - DB.config.anioInicial)*12 + (mes - DB.config.mesInicial);
  const conceptoDe = (b,grupo)=> resumido ? ('Total '+grupo) : ((b.concepto||'').trim()||b.rubro);

  if(soloMes){
    // --- Solo el mes seleccionado: actualiza SOLO esa columna, conserva los demás meses ---
    const i = colDe(presMonth.anio, presMonth.mes);
    if(i<0 || i>59){ toast('El mes seleccionado está fuera del horizonte de 5 años','err'); return; }
    // 1. Vacía únicamente la columna de este mes en las filas que vienen del presupuesto
    DB.flujo.forEach(r=>{ if(r.origen==='presupuesto') r.valores[i]=0; });
    // 2. Carga los rubros del mes en esa columna (crea la fila si no existe)
    const src = DB.presupuesto.filter(b=> b.anio===presMonth.anio && b.mes===presMonth.mes);
    src.forEach(b=>{
      const grupo = grupoDe(b), concepto = conceptoDe(b,grupo);
      let row = DB.flujo.find(r=> r.origen==='presupuesto' && r.grupo===grupo && r.concepto===concepto);
      if(!row){ row = {id:uid(),grupo,concepto,valores:new Array(60).fill(0),crecimiento:0,visible:true,origen:'presupuesto'}; DB.flujo.push(row); }
      row.valores[i] += num(b.proyectado);
    });
    // 3. Elimina filas del presupuesto que quedaron en cero en todos los meses
    DB.flujo = DB.flujo.filter(r=> r.origen!=='presupuesto' || r.valores.some(v=>num(v)!==0));
    saveDB(); updateTopbar();
    toast(`Flujo actualizado · solo ${MESES[presMonth.mes]} ${presMonth.anio} (${src.length} rubro/s)`);
    go('flujo'); return;
  }

  // --- Todos los meses cargados: reconstruye todas las filas del presupuesto ---
  DB.flujo = DB.flujo.filter(r=> r.origen!=='presupuesto');
  const mapRows = {}; let fuera = 0;
  DB.presupuesto.forEach(b=>{
    const i = colDe(b.anio, b.mes);
    if(i<0 || i>59){ fuera++; return; }
    const grupo = grupoDe(b), concepto = conceptoDe(b,grupo);
    const clave = resumido ? grupo : grupo+'||'+concepto;
    if(!mapRows[clave]) mapRows[clave] = {id:uid(),grupo,concepto,valores:new Array(60).fill(0),crecimiento:0,visible:true,origen:'presupuesto'};
    mapRows[clave].valores[i] += num(b.proyectado);
  });
  const nuevas = Object.values(mapRows);
  DB.flujo = DB.flujo.concat(nuevas);
  saveDB(); updateTopbar();
  toast(`Flujo actualizado desde el presupuesto · ${nuevas.length} fila(s)`+(fuera?` · ${fuera} fuera de rango`:''));
  go('flujo');
}

// Replica la estructura del mes actual hacia los meses siguientes
function presReplicate(){
  const src = presRows(presMonth.anio, presMonth.mes);
  if(!src.length){ toast('Este mes no tiene filas para replicar','err'); return; }
  openForm('Replicar estructura', [
    {key:'meses',label:'¿Cuántos meses hacia adelante?',type:'number',value:11,required:true,hint:'Máximo 59. Copia los rubros a los meses siguientes sin sobrescribir montos ya cargados.'},
    {key:'copiarReal',label:'Copiar también montos reales',type:'checkbox',value:false},
  ], data=>{
    const n = clamp(Math.round(data.meses),1,59);
    const list = monthList60();
    const startIdx = list.findIndex(x=>x.anio===presMonth.anio && x.mes===presMonth.mes);
    let added=0;
    for(let k=1;k<=n;k++){
      const tgt = list[startIdx+k]; if(!tgt) break;
      src.forEach(s=>{
        const exists = DB.presupuesto.some(b=>b.anio===tgt.anio && b.mes===tgt.mes && b.rubro===s.rubro && b.tipo===s.tipo && b.concepto===s.concepto);
        if(!exists){ DB.presupuesto.push({id:uid(),anio:tgt.anio,mes:tgt.mes,tipo:s.tipo,rubro:s.rubro,concepto:s.concepto,proyectado:s.proyectado,real:data.copiarReal?s.real:0}); added++; }
      });
    }
    saveDB(); toast(`Estructura replicada (${added} filas creadas)`);
  });
}
function exportPresupuestoCSV(){
  const rows = DB.presupuesto.map(b=>{
    const dif=num(b.real)-num(b.proyectado);
    return [b.anio, MESES[b.mes], b.tipo, b.rubro, b.concepto, b.proyectado, b.real, dif];
  });
  download('presupuesto.csv', toCSV(['Año','Mes','Tipo','Rubro','Concepto','Proyectado','Real','Diferencia'], rows),'text/csv');
  toast('CSV exportado','info');
}

      </div>
    </div>
    <div class="matrix-wrap"><table class="matrix" id="flujoTable"></table></div>`;

function renderFlujoTable(){
  const list = monthList60();
  const yearCols = [0,1,2,3,4];
  let head = `<thead><tr><th class="rowh">Concepto</th>`;
  list.forEach(x=> head+=`<th>${MESES[x.mes]} ${String(x.anio).slice(2)}</th>`);
  yearCols.forEach(y=> head+=`<th class="yearcol">Año ${y+1}</th>`);
  head += `<th class="totcol">Total 5A</th></tr></thead>`;

  const yearTot = vals => yearCols.map(y=> vals.slice(y*12,y*12+12).reduce((s,v)=>s+num(v),0));
  const grand = vals => vals.reduce((s,v)=>s+num(v),0);
  const fmt = v => Math.round(v).toLocaleString('es-PY');
  const rowCells = (vals, cls='') => `${vals.map(v=>`<td class="${cls}">${fmt(v)}</td>`).join('')}${yearTot(vals).map(t=>`<td class="yearcol">${fmt(t)}</td>`).join('')}<td class="totcol">${fmt(grand(vals))}</td>`;

  let body='<tbody>';

  // Acumuladores por naturaleza (para netos y ahorro)
  const totalIngresos = new Array(60).fill(0);   // Ingresos fijos + variables
  const totalEgresos  = new Array(60).fill(0);   // Egresos fijos + variables + deudas + tarjetas
  const totalAhorroInv= new Array(60).fill(0);   // Ahorros + Inversiones (lo que apartás)
  const totalAhorros  = new Array(60).fill(0);   // solo grupo Ahorros (para el bloque de ahorro)

  // Qué grupos suman a cada gran total
  const esIngreso = g => g==='Ingresos fijos' || g==='Ingresos variables' || g==='Ingresos';
  const esEgreso  = g => ['Egresos fijos','Egresos variables','Deudas','Tarjetas de crédito'].includes(g);
  const esAhorro  = g => g==='Ahorros' || g==='Inversiones';

  GRUPOS_FLUJO.forEach(grupo=>{
    const rows = DB.flujo.filter(r=>r.grupo===grupo);
    if(rows.length===0) return; // no mostrar grupos vacíos
    // Encabezado de sección
    body += `<tr class="grp"><td class="rowh">${grupo.toUpperCase()}</td>${list.map(()=>'<td></td>').join('')}${yearCols.map(()=>'<td class="yearcol"></td>').join('')}<td class="totcol"></td></tr>`;
    // Subtotal del grupo
    const subtotal = new Array(60).fill(0);
    rows.forEach(r=>{
      if(r.visible===false){
        body += `<tr style="opacity:.4"><td class="rowh">${esc(r.concepto)} <span class="section-tag">(oculto)</span> <button class="ia" style="width:22px;height:22px;display:inline-grid" onclick="flujoRowMenu('${r.id}')">${icon('config')}</button></td>${list.map(()=>'<td>—</td>').join('')}${yearCols.map(()=>'<td class="yearcol">—</td>').join('')}<td class="totcol">—</td></tr>`;
        return;
      }
      r.valores.forEach((v,i)=> subtotal[i]+=num(v));
      body += `<tr>
        <td class="rowh">${esc(r.concepto)}
          <button class="ia" style="width:22px;height:22px;display:inline-grid;vertical-align:middle" onclick="flujoRowMenu('${r.id}')">${icon('config')}</button></td>
        ${r.valores.map((v,i)=>`<td class="editable" contenteditable onblur="flujoCell('${r.id}',${i},this.textContent)">${num(v)}</td>`).join('')}
        ${yearTot(r.valores).map(t=>`<td class="yearcol">${fmt(t)}</td>`).join('')}
        <td class="totcol">${fmt(grand(r.valores))}</td>
      </tr>`;
    });
    // Fila TOTAL <grupo>
    body += `<tr class="sub"><td class="rowh">TOTAL ${grupo.toUpperCase()}</td>${rowCells(subtotal)}</tr>`;
    // Acumular a los grandes totales
    subtotal.forEach((v,i)=>{ if(esIngreso(grupo)) totalIngresos[i]+=v; if(esEgreso(grupo)) totalEgresos[i]+=v; if(esAhorro(grupo)) totalAhorroInv[i]+=v; if(grupo==='Ahorros') totalAhorros[i]+=v; });
  });

  // Grandes totales
  body += `<tr class="net net-ing"><td class="rowh">TOTAL INGRESOS</td>${rowCells(totalIngresos)}</tr>`;
  body += `<tr class="net net-egr"><td class="rowh">TOTAL EGRESOS</td>${rowCells(totalEgresos)}</tr>`;

  // Ahorro del mes = sobrante del mes = TOTAL INGRESOS − TOTAL EGRESOS
  // (se calcula solo; NO cargar una fila de ahorro a mano)
  const ahorroMes = totalIngresos.map((v,i)=> v - totalEgresos[i]);
  // Ahorro mes pasado (desplazado 1 mes; el primero arranca del saldo inicial configurable)
  const saldoInicial = num(DB.config.ahorroInicial||0);
  const ahorroPasado = ahorroMes.map((_,i)=> i===0 ? saldoInicial : acumHasta(ahorroMes, i-1, saldoInicial));
  // Ahorro acumulado = saldo inicial + suma de los ahorros del mes hasta i
  const ahorroAcum = ahorroMes.map((_,i)=> acumHasta(ahorroMes, i, saldoInicial));

  body += `<tr class="sub sub-sep"><td class="rowh">AHORRO DEL MES</td>${rowCells(ahorroMes)}</tr>`;
  body += `<tr class="acc-prev"><td class="rowh">AHORRO MES PASADO</td>${ahorroPasado.map(v=>`<td>${fmt(v)}</td>`).join('')}${yearCols.map(y=>`<td class="yearcol">${fmt(y===0?saldoInicial:ahorroAcum[y*12-1])}</td>`).join('')}<td class="totcol"></td></tr>`;
  body += `<tr class="acc"><td class="rowh">AHORRO ACUMULADO</td>${ahorroAcum.map(v=>`<td>${fmt(v)}</td>`).join('')}${yearCols.map(y=>`<td class="yearcol">${fmt(ahorroAcum[y*12+11])}</td>`).join('')}<td class="totcol">${fmt(ahorroAcum[59])}</td></tr>`;

  body += '</tbody>';
  $('#flujoTable').innerHTML = head+body;
}
// Suma de un array desde 0 hasta idx (inclusive), partiendo de un valor base
function acumHasta(arr, idx, base=0){ let s=base; for(let k=0;k<=idx;k++) s+=num(arr[k]); return s; }
function flujoCell(id,i,val){ const r=DB.flujo.find(x=>x.id===id); if(r){ r.valores[i]=num(val); saveDB(); renderFlujoTable(); } }

function flujoRowMenu(id){
  const r=DB.flujo.find(x=>x.id===id);
  infoModal('Acciones · '+r.concepto, `
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-ghost" onclick="flujoGrowth('${id}')">${icon('flow')} Aplicar crecimiento mensual %</button>
      <button class="btn btn-ghost" onclick="flujoReplicate('${id}')">${icon('copy')} Replicar 1er valor hacia adelante</button>
      <button class="btn btn-ghost" onclick="flujoClear('${id}')">${icon('x')} Limpiar valores</button>
      <button class="btn btn-ghost" onclick="flujoToggle('${id}')">${icon(r.visible===false?'check':'info')} ${r.visible===false?'Mostrar':'Ocultar'} fila</button>
      <button class="btn btn-ghost" onclick="editFlujoRow('${id}')">${icon('edit')} Editar concepto/grupo</button>
      <button class="btn btn-danger" onclick="flujoDel('${id}')">${icon('trash')} Eliminar fila</button>
    </div>`);
}
function flujoGrowth(id){
  closeModal();
  const r=DB.flujo.find(x=>x.id===id);
  openForm('Aplicar crecimiento', [
    {key:'base',label:'Valor base (mes 1)',type:'number',value:r.valores[0]||0,required:true},
    {key:'g',label:'Crecimiento mensual %',type:'number',value:r.crecimiento||0,step:'0.1',hint:'Ej: 1 = 1% mensual compuesto sobre los 60 meses.'},
  ], data=>{
    r.crecimiento=data.g;
    for(let i=0;i<60;i++) r.valores[i]=Math.round(data.base*Math.pow(1+data.g/100,i));
    saveDB(); renderFlujoTable(); toast('Crecimiento aplicado');
  });
}
function flujoReplicate(id){ closeModal(); const r=DB.flujo.find(x=>x.id===id); const v=r.valores[0]; r.valores=r.valores.map(()=>v); saveDB(); renderFlujoTable(); toast('Valor replicado'); }
function flujoClear(id){ closeModal(); const r=DB.flujo.find(x=>x.id===id); r.valores=new Array(60).fill(0); saveDB(); renderFlujoTable(); toast('Valores limpiados'); }
function flujoToggle(id){ closeModal(); const r=DB.flujo.find(x=>x.id===id); r.visible = r.visible===false; saveDB(); renderFlujoTable(); }
function flujoDel(id){ closeModal(); DB.flujo=DB.flujo.filter(x=>x.id!==id); saveDB(); renderFlujoTable(); toast('Fila eliminada'); }
function editFlujoRow(id){
  closeModal();
  const r = id? DB.flujo.find(x=>x.id===id) : {};
  openForm(id?'Editar fila de flujo':'Nueva fila de flujo', [
    {key:'grupo',label:'Grupo',type:'select',options:GRUPOS_FLUJO,value:r.grupo||'Egresos variables',required:true},
    {key:'concepto',label:'Concepto',type:'text',value:r.concepto,required:true},
    {key:'base',label:'Valor base mensual',type:'number',value:r.valores?r.valores[0]:0},
    {key:'crecimiento',label:'Crecimiento mensual %',type:'number',value:r.crecimiento||0,step:'0.1'},
  ], data=>{
    if(id){ r.grupo=data.grupo; r.concepto=data.concepto; r.crecimiento=data.crecimiento;
      for(let i=0;i<60;i++) r.valores[i]=Math.round(data.base*Math.pow(1+data.crecimiento/100,i));
    } else {
      DB.flujo.push({id:uid(),grupo:data.grupo,concepto:data.concepto,crecimiento:data.crecimiento,visible:true,
        valores:Array.from({length:60},(_,i)=>Math.round(data.base*Math.pow(1+data.crecimiento/100,i)))});
    }
    saveDB(); renderFlujoTable(); toast(id?'Fila actualizada':'Fila creada');
  });
}
function exportFlujoCSV(){
  const list=monthList60();
  const headers=['Grupo','Concepto',...list.map(x=>MESES[x.mes]+' '+x.anio),'Total 5A'];
  const rows=DB.flujo.map(r=>[r.grupo,r.concepto,...r.valores.map(v=>num(v)), r.valores.reduce((s,v)=>s+num(v),0)]);
  download('flujo_5_anios.csv', toCSV(headers, rows),'text/csv');
  toast('CSV exportado','info');
}

function procesarResumenTarjeta(tarjetaId){
  const t = DB.tarjetas.find(x=>x.id===tarjetaId);
  const actual = t && t.resumen ? `<p class="hint" style="margin-top:6px">Archivo actual: <b>${esc(t.resumen)}</b></p>` : '';
  infoModal('Cargar resumen de tarjeta', `
    <p style="font-size:13.5px;line-height:1.6;color:var(--text-dim)">
      Adjuntá el resumen en PDF o imagen. Se guarda dentro del sistema y podés volver a verlo cuando quieras.
    </p>
    ${actual}
    <div class="field" style="margin-top:14px"><label>Archivo de resumen (PDF / imagen, máx. 2 MB)</label>
      <input type="file" id="resumenFile" accept=".pdf,image/*" onchange="guardarResumen('${tarjetaId}', this)"></div>
    <p class="hint" id="resumenMsg" style="margin-top:10px"></p>`);
}
function guardarResumen(tarjetaId, input){
  const f = input.files && input.files[0];
  const msg = document.getElementById('resumenMsg');
  if(!f) return;
  if(f.size > 2*1024*1024){ if(msg){msg.textContent='El archivo supera los 2 MB. Usá uno más liviano.'; msg.style.color='var(--red)';} return; }
  const r = new FileReader();
  r.onload = e=>{
    const t = DB.tarjetas.find(x=>x.id===tarjetaId);
    if(t){ t.resumen = f.name; t.resumenData = e.target.result; t.resumenType = f.type; saveDB(); }
    closeModal(); renderTarjetas(); toast('Resumen adjuntado: '+f.name);
  };
  r.onerror = ()=>{ if(msg){msg.textContent='No se pudo leer el archivo.'; msg.style.color='var(--red)';} };
  r.readAsDataURL(f);
}
function verResumen(tarjetaId){
  const t = DB.tarjetas.find(x=>x.id===tarjetaId);
  if(!t || !t.resumenData){ toast('Esta tarjeta no tiene resumen adjunto','err'); return; }
  try{
    const [meta, b64] = t.resumenData.split(',');
    const mime = (meta.match(/data:(.*?);/)||[])[1] || t.resumenType || 'application/octet-stream';
    const bin = atob(b64); const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr],{type:mime}));
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url), 30000);
  }catch(e){ toast('No se pudo abrir el resumen','err'); }
}
function quitarResumen(tarjetaId){
  const t = DB.tarjetas.find(x=>x.id===tarjetaId);
  if(t){ delete t.resumen; delete t.resumenData; delete t.resumenType; saveDB(); renderTarjetas(); toast('Resumen quitado'); }
}

const SIM_META = {conservador:{label:'Conservador',cls:'scn-opt',color:C.green},medio:{label:'Medio',cls:'scn-base',color:C.blue},agresivo:{label:'Agresivo',cls:'scn-pes',color:C.red}};

function simCalc(s){
  const am = amortFrances(num(s.monto), num(s.tasa), Math.max(1,num(s.plazo)));
  const cargosFijos = num(s.admin)+num(s.otros);
  const seguroTotal = num(s.seguro)*num(s.plazo);
  const totalPagar = am.totalPagar + cargosFijos + seguroTotal;
  const cft = ((totalPagar/num(s.monto))-1)*100; // costo financiero total aprox
  return { cuota:am.cuota, totalPagar, totalInteres:am.totalInteres, cargos:cargosFijos+seguroTotal, cft, tabla:am.tabla };
}
function renderSimCards(){
  $('#simCards').innerHTML = Object.keys(simState).map(k=>{
    const s=simState[k], m=SIM_META[k], r=simCalc(s);
    const inp=(f,lab,step)=>`<div class="field"><label>${lab}</label><input type="number" ${step?`step="${step}"`:''} value="${s[f]}" onchange="simSet('${k}','${f}',this.value)"></div>`;
    return `<div class="scn-card ${m.cls}">
      <h4><span class="dot" style="background:${m.color}"></span>${m.label}</h4>
      <div class="form-grid">
        ${inp('monto','Monto')}${inp('tasa','Tasa anual %','0.1')}
        ${inp('plazo','Plazo (meses)')}${inp('admin','Costo admin.')}
        ${inp('seguro','Seguro mensual')}${inp('otros','Otros cargos')}

      <div class="stat-line"><span>Cuota mensual</span><b style="color:${m.color}">${money(r.cuota)}</b></div>
      <div class="stat-line"><span>Total a pagar</span><b>${money(r.totalPagar)}</b></div>
      <div class="stat-line"><span>Total intereses</span><b class="neg">${money(r.totalInteres)}</b></div>
      <div class="stat-line"><span>Cargos + seguro</span><b>${money(r.cargos)}</b></div>
      <div class="stat-line"><span>Costo fin. total</span><b>${pct(r.cft,1)}</b></div>
    </div>`;
  }).join('');
}
function simSet(k,f,v){ simState[k][f]=num(v); renderSimCards(); renderSimComparison(); if($('#simAmSel')?.value===k) renderSimAmort(k); }
function renderSimComparison(){
  const ks=Object.keys(simState);
  makeChart('chSim',{type:'bar',data:{labels:ks.map(k=>SIM_META[k].label),datasets:[

// Calcula flujo mensual base + escenarios optimista / pesimista a 60 meses
function computeScenarios(){
  const nw = computeNetWorth();
  const baseInv = investTotals().valorActual;
  // Flujo base mensual desde módulo Flujo
  const baseNet=[], baseIng=[], baseEgr=[];
  for(let i=0;i<60;i++){
    let ing=0,egr=0;
    DB.flujo.forEach(r=>{ if(r.visible===false) return; const v=num(r.valores[i]||0); if(r.grupo==='Ingresos') ing+=v; else egr+=v; });
    baseIng.push(ing); baseEgr.push(egr); baseNet.push(ing-egr);
  }
  const opt=DB.escenarios.optimista, pes=DB.escenarios.pesimista;
  const build=(ingMult,egrMult,extraEgrPct)=>{
    const net=[],acum=[]; let a=0;
    for(let i=0;i<60;i++){
      const ing=baseIng[i]*ingMult;
      const egr=baseEgr[i]*egrMult*(1+(extraEgrPct||0)/100);
      const n=ing-egr; net.push(n); a+=n; acum.push(Math.round(a));
    }
    return {net,acum};
  };
  const base = build(1,1,0);
  const optimista = build(1+num(opt.ingresos)/100, 1+num(opt.egresos)/100, 0);
  const pesimista = build(1+num(pes.ingresos)/100, 1+num(pes.egresos)/100, num(pes.imprevistos));

  const metrics = (s, rendPct)=>{
    const avg = s.net.reduce((x,y)=>x+y,0)/60;
    const flujo5 = s.acum[59];
    const invGrowth = baseInv*Math.pow(1+num(rendPct)/100,5);
    const patrimonio5 = nw.patrimonio + flujo5 + (invGrowth-baseInv);
    const capacidad = Math.max(0, avg);
    const metasOk = DB.metas.filter(m=>m.estado==='Activa').filter(m=>{ const g=goalCalc(m); return (num(m.acumulado)+capacidad*g.mesesRest)>=num(m.objetivo); }).length;
    return {avg, flujo5, patrimonio5, capacidad, nivelDeuda:computeNetWorth().pasivos, metasOk};
  };
  const labels = Array.from({length:60},(_,i)=>{ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+i); return MESES[d.getMonth()]+' '+String(d.getFullYear()).slice(2); });
  return {
    labels,
    base:{...base, m:metrics(base,0)},
    optimista:{...optimista, m:metrics(optimista,num(opt.rendimiento))},
    pesimista:{...pesimista, m:metrics(pesimista,num(pes.rendimiento))},
  };
}

    ${metric('Flujo acumulado 5 años','flujo5')}
    ${metric('Patrimonio neto proyectado','patrimonio5')}
    ${metric('Capacidad de ahorro','capacidad')}
    ${metric('Metas alcanzables','metasOk',v=>v+' metas')}
  </tbody></table>`;
}

/* ==================================================================
   MÓDULO 10 · CONFIGURACIÓN / EXPORTACIÓN
   ================================================================== */
RENDERERS.config = (root)=>{
  const c=DB.config;
  const years=[]; for(let y=new Date().getFullYear()-2;y<=new Date().getFullYear()+3;y++) years.push(y);
  root.innerHTML = `
    <div class="sec-head"><div><h2>Preferencias</h2></div></div>
    <div class="card pad">
      <div class="cfg-row">
        <div class="desc"><h4>Moneda principal</h4><p>Símbolo y código usados en todo el sistema.</p></div>
        <div style="display:flex;gap:10px">
          <input class="inp-inline" id="cfgMoneda" value="${esc(c.moneda)}" style="max-width:90px" placeholder="PYG">
          <input class="inp-inline" id="cfgSimbolo" value="${esc(c.monedaSimbolo)}" style="max-width:90px" placeholder="US$">
        </div>
      </div>
      <div class="cfg-row">
        <div class="desc"><h4>Año inicial del flujo</h4><p>Primer año del flujo proyectado a 5 años.</p></div>
        <select class="inp-inline" id="cfgAnio" style="max-width:120px">${years.map(y=>`<option ${y===c.anioInicial?'selected':''}>${y}</option>`).join('')}</select>
      </div>
      <div class="cfg-row">
        <div class="desc"><h4>Mes inicial del flujo</h4><p>Primer mes del flujo proyectado.</p></div>
        <select class="inp-inline" id="cfgMes" style="max-width:140px">${MESES_FULL.map((m,i)=>`<option value="${i}" ${i===c.mesInicial?'selected':''}>${m}</option>`).join('')}</select>
      </div>
      <div class="cfg-row">
        <div class="desc"><h4>Ahorro inicial (saldo de arranque)</h4><p>Saldo con el que arrancás el flujo (ej: cierre del mes anterior). Alimenta "Ahorro mes pasado" y el acumulado.</p></div>
        <input class="inp-inline" id="cfgAhorroIni" type="number" value="${num(c.ahorroInicial)}" style="max-width:160px" placeholder="0">
      <div class="cfg-row">
        <div class="desc"><h4>Guardar preferencias</h4><p>Aplica los cambios de moneda y flujo.</p></div>
        <button class="btn btn-primary" onclick="saveConfig()">${icon('check')} Guardar</button>
      </div>
    </div>

    <div class="sec-head"><div><h2>Datos y respaldo</h2></div></div>
    <div class="card pad">
      <div class="cfg-row">
        <div class="desc"><h4>Exportar todo (JSON)</h4><p>Descarga un respaldo completo del sistema.</p></div>
        <button class="btn btn-green" onclick="exportJSON()">${icon('download')} Exportar JSON</button>
      </div>
      <div class="cfg-row">
        <div class="desc"><h4>Importar desde JSON</h4><p>Restaura datos desde un respaldo. Reemplaza los datos actuales.</p></div>
        <label class="btn btn-ghost">${icon('upload')} Importar JSON<input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label>
      </div>
      <div class="cfg-row">
        <div class="desc"><h4>Exportar tablas (CSV)</h4><p>Movimientos, presupuesto y flujo.</p></div>
        <div class="btn-row">
          <button class="btn btn-sm btn-ghost" onclick="exportMovimientosCSV()">Movimientos</button>
          <button class="btn btn-sm btn-ghost" onclick="exportPresupuestoCSV()">Presupuesto</button>
          <button class="btn btn-sm btn-ghost" onclick="exportFlujoCSV()">Flujo</button>
        </div>
      </div>
    </div>

    <div class="sec-head"><div><h2>Zona de riesgo</h2></div></div>
    <div class="card pad" style="border-color:var(--red-d)">
      <div class="cfg-row">
        <div class="desc"><h4>Empezar de cero</h4><p>Vacía todos los datos y montos, conservando tus categorías. Ideal para carga manual.</p></div>
        <button class="btn btn-ghost" onclick="resetBlank()">${icon('plus')} Empezar de cero</button>
      </div>
      <div class="cfg-row">
        <div class="desc"><h4>Restaurar datos demo</h4><p>Reemplaza todo por los datos de ejemplo iniciales.</p></div>
        <button class="btn btn-ghost" onclick="resetDemo()">${icon('copy')} Cargar demo</button>
      </div>
      <div class="cfg-row">
        <div class="desc"><h4 class="neg">Borrar todos los datos</h4><p>Elimina permanentemente toda la información guardada.</p></div>
        <button class="btn btn-danger" onclick="wipeAll()">${icon('trash')} Borrar todo</button>
      </div>
    </div>
    <div class="hint" style="text-align:center;margin-top:24px">Finanzas Personales ERP · v1 · Todos los datos se guardan localmente en tu navegador (localStorage). Sin backend.</div>`;
};
function saveConfig(){
  DB.config.moneda=$('#cfgMoneda').value.trim()||'PYG';
  DB.config.monedaSimbolo=$('#cfgSimbolo').value.trim()||'$';
  DB.config.anioInicial=+$('#cfgAnio').value;
  DB.config.mesInicial=+$('#cfgMes').value;
  DB.config.ahorroInicial=num($('#cfgAhorroIni').value);
  saveDB(); updateTopbar(); toast('Preferencias guardadas'); go('config');
}
function exportJSON(){ download('finanzas_erp_backup.json', JSON.stringify(DB,null,2),'application/json'); toast('Respaldo exportado','info'); }
function importJSON(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ try{ const data=JSON.parse(e.target.result); if(!data.config) throw 0; DB=data; saveDB(); toast(window.__CLOUD_ACTIVE?'Datos importados y subidos a la nube':'Datos importados'); go('dashboard'); }catch(err){ toast('Archivo JSON inválido','err'); } };
  r.readAsText(f);
}
function resetBlank(){ confirmModal('Empezar de cero','Se vaciarán todos los datos y montos (movimientos, tarjetas, préstamos, inversiones, metas, patrimonio, presupuesto y flujo). Tus <b>categorías</b> se conservan. ¿Continuar?',()=>{ DB=blankDB(); saveDB(); toast('Sistema vaciado · listo para cargar'); go('dashboard'); },false); }
function resetDemo(){ confirmModal('Cargar datos demo','Esto reemplazará todos tus datos por los de ejemplo. ¿Continuar?',()=>{ DB=seedDB(); saveDB(); toast('Datos demo cargados'); go('dashboard'); },false); }
function wipeAll(){
  confirmModal('Borrar todos los datos','Se eliminará <b>permanentemente</b> toda tu información financiera. Esta acción no se puede deshacer. ¿Confirmás?',()=>{
    localStorage.removeItem(STORAGE_KEY);
    DB={config:{moneda:'PYG',monedaSimbolo:'₲',anioInicial:new Date().getFullYear(),mesInicial:new Date().getMonth(),ahorroInicial:0},
      rubros:[],movimientos:[],presupuesto:[],flujo:[],tarjetas:[],consumos:[],prestamos:[],inversiones:[],metas:[],
      patrimonio:{activos:[],pasivos:[]},escenarios:{optimista:{ingresos:8,egresos:-5,rendimiento:4,ahorro:15},pesimista:{ingresos:-10,egresos:8,rendimiento:-3,imprevistos:6}},alertasResueltas:[],simulaciones:[]};
    saveDB(); toast('Todos los datos fueron borrados'); go('dashboard');
  });
}

/* ==================================================================
   INICIALIZACIÓN
   ================================================================== */
function init(){
  DB = loadDB();
  if(!DB){ DB = blankDB(); saveDB(); }
  // Migración defensiva: asegura arrays esperados
  ['rubros','movimientos','presupuesto','flujo','tarjetas','consumos','prestamos','inversiones','metas','alertasResueltas','simulaciones','saldos'].forEach(k=>{ if(!Array.isArray(DB[k])) DB[k]=[]; });
  if(!DB.patrimonio) DB.patrimonio={activos:[],pasivos:[]};
  // Asegura el bolsillo especial "Ahorros" (vinculado al ahorro real) si no existe
  if(Array.isArray(DB.saldos) && !DB.saldos.some(s=>s.esAhorro)){
    DB.saldos.unshift({id:uid(),nombre:'Ahorros',modo:'acumula',responsable:'Compartido',color:'#2bff9e',esAhorro:true});
  }
  if(!DB.escenarios) DB.escenarios={optimista:{ingresos:8,egresos:-5,rendimiento:4,ahorro:15},pesimista:{ingresos:-10,egresos:8,rendimiento:-3,imprevistos:6}};
  buildNav();
  document.addEventListener('click', e=>{ if(!e.target.closest('.ms')) $$('.ms.open').forEach(x=>x.classList.remove('open')); });
  try{ applyTheme(localStorage.getItem(THEME_KEY)||'dark'); }catch(e){ applyTheme('dark'); }
  go('dashboard');
  window.addEventListener('resize', ()=>{ if(window.innerWidth>860){ $('#sidebar').classList.remove('open'); $('#navBackdrop').classList.remove('open'); } });
}
// En modo nube, init() lo dispara el login (window.__cloudReady). Si NO hay nube, arranca normal.
document.addEventListener('DOMContentLoaded', ()=>{
  if(!window.CLOUD){ init(); }   // modo local (sin Firebase) sigue funcionando igual
});

</script>
</body>
